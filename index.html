<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- 原有样式不变，省略 -->
</head>
<body class="flex flex-col md:flex-row">
  <!-- 左侧侧边栏：修复箭头图标ID，避免选择器冲突 -->
  <aside class="sidebar w-64 h-screen fixed left-0 top-0 z-50 transform -translate-x-full md:translate-x-0">
    <!-- Logo区域 不变 -->
    
    <!-- 导航菜单：为每个箭头添加唯一ID -->
    <nav class="flex-1 py-4">
      <ul class="space-y-1">
        <!-- 首页 不变 -->
        
        <!-- 美股策略（二级菜单）：箭头添加id="arrow-strategy" -->
        <li>
          <button id="strategyBtn" class="sidebar-link w-full text-left px-6 py-3 flex items-center justify-between">
            <span><i class="fa fa-cogs mr-3"></i>美股策略</span>
            <i class="fa fa-angle-right arrow-icon" id="arrow-strategy"></i>
          </button>
          <ul id="strategySubmenu" class="submenu">
            <!-- 子菜单不变 -->
          </ul>
        </li>
        
        <!-- A股策略（二级菜单）：箭头添加id="arrow-strategy-cn" -->
        <li>
          <button id="strategyCNBtn" class="sidebar-link w-full text-left px-6 py-3 flex items-center justify-between">
            <span><i class="fa fa-cogs mr-3"></i>A股策略</span>
            <i class="fa fa-angle-right arrow-icon" id="arrow-strategy-cn"></i>
          </button>
          <ul id="strategyCNSubmenu" class="submenu">
            <!-- 子菜单不变 -->
          </ul>
        </li>
        
        <!-- 学习（二级菜单）：箭头添加id="arrow-study" -->
        <li>
          <button id="studyBtn" class="sidebar-link w-full text-left px-6 py-3 flex items-center justify-between">
            <span><i class="fa fa-book mr-3"></i>金融知识</span>
            <i class="fa fa-angle-right arrow-icon" id="arrow-study"></i>
          </button>
          <ul id="studySubmenu" class="submenu">
            <!-- 子菜单不变 -->
          </ul>
        </li>
        
        <!-- 联系 不变 -->
      </ul>
    </nav>
    
    <!-- 底部信息 不变 -->
  </aside>

  <!-- 右侧内容区 不变 -->
  <main class="flex-1 w-full min-h-screen md:ml-64 bg-white">
    <!-- 移动端菜单按钮 不变 -->
    <button id="mobileMenuBtn" class="mobile-btn md:hidden fixed top-4 left-4 z-50 text-white p-2 rounded-lg shadow-md">
      <i class="fa fa-bars"></i>
    </button>
    
    <iframe id="contentFrame" class="w-full h-screen border-none" src="about:blank"></iframe>
  </main>

  <script>
    // ========== 修复1：二级菜单箭头选择器（唯一ID） ==========
    // 美股策略
    const strategyBtn = document.getElementById('strategyBtn');
    const strategySubmenu = document.getElementById('strategySubmenu');
    const arrowIcon = document.getElementById('arrow-strategy'); // 用ID选择
    strategyBtn.addEventListener('click', () => {
      strategySubmenu.classList.toggle('open');
      arrowIcon.classList.toggle('rotate');
    });

    // A股策略
    const strategyCNBtn = document.getElementById('strategyCNBtn');
    const strategyCNSubmenu = document.getElementById('strategyCNSubmenu');
    const arrowIconCN = document.getElementById('arrow-strategy-cn'); // 用ID选择
    strategyCNBtn.addEventListener('click', () => {
      strategyCNSubmenu.classList.toggle('open');
      arrowIconCN.classList.toggle('rotate');
    });

    // 学习菜单
    const studyBtn = document.getElementById('studyBtn');
    const studySubmenu = document.getElementById('studySubmenu');
    const arrowIcon2 = document.getElementById('arrow-study'); // 用ID选择
    studyBtn.addEventListener('click', () => {
      studySubmenu.classList.toggle('open');
      arrowIcon2.classList.toggle('rotate');
    });

    // ========== 修复2：移动端侧边栏逻辑 ==========
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const sidebar = document.querySelector('.sidebar');
    
    mobileMenuBtn.addEventListener('click', () => {
      sidebar.classList.toggle('-translate-x-full');
      // 修复：移动端点击菜单时显示侧边栏（移除hidden，原代码有hidden导致移动端不显示）
      sidebar.classList.remove('hidden');
    });

    // 点击菜单后关闭移动端侧边栏（保留）
    document.querySelectorAll('.sidebar-link, .submenu-link').forEach(item => {
      item.addEventListener('click', () => {
        if (window.innerWidth < 768) {
          sidebar.classList.add('-translate-x-full');
        }
      });
    });

    // ========== 修复3：loadPage函数（解决event.target和路径问题） ==========
    const frame = document.getElementById('contentFrame');
    // 给函数添加event参数，避免未定义
    function loadPage(event, type) {
      // 阻止事件冒泡（避免影响父级菜单）
      event.preventDefault();
      event.stopPropagation();
      
      // 移除所有active类
      document.querySelectorAll('.sidebar-link, .submenu-link').forEach(link => {
        link.classList.remove('active');
      });
      
      // 给当前点击的元素添加active（用event.currentTarget更稳定）
      event.currentTarget.classList.add('active');
      
      // ========== 关键：确认以下文件路径是否正确 ==========
      // 建议先测试绝对路径（如本地文件路径），再改相对路径
      const pageMap = {
        home: 'home.html',
        trend: 'trend.html',
        swing: 'swing.html',
        'trend-cn': 'trend-cn.html',
        'swing-cn': 'swing-cn.html',
        contact: 'contact.html',
        w1: 'w1.html',
        w2: 'w2.html',
        w3: 'w3.html',
        w4: 'w4.html',
        w5: 'w5.html',
        w6: 'w6.html',
        w7: 'w7.html',
        w8: 'w8.html',
        study: 'study.html'
      };
      
      // 加载页面（添加容错：路径不存在时提示）
      const targetSrc = pageMap[type] || '404.html';
      frame.src = targetSrc;
      
      // 调试：控制台打印加载路径，方便排查
      console.log('加载页面：', targetSrc);
    }

    // ========== 修复4：页面初始化 ==========
    window.onload = () => {
      // 移除侧边栏hidden（移动端也能显示）
      sidebar.classList.remove('hidden');
      // 初始化加载首页（传递空event，避免报错）
      loadPage({
        preventDefault: () => {},
        stopPropagation: () => {},
        currentTarget: document.querySelector('.sidebar-link')
      }, 'home');
      // 给首页添加active
      document.querySelector('.sidebar-link').classList.add('active');
    };

    // ========== 修复5：修改HTML中onclick调用方式（传递event） ==========
    // 注意：需要同步修改所有菜单的onclick，例如：
    // 首页：<a onclick="loadPage(event, 'home')" ...>
    // 趋势交易：<a onclick="loadPage(event, 'trend')" ...>
    // （下方会统一修正HTML中的onclick）
  </script>
</body>
</html>
