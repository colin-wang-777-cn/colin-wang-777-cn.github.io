<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VickyPedia - 交易学习与策略</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            overflow-x: hidden;
        }

        /* 侧边栏样式 */
        .sidebar {
            background-color: #222222;
            transition: all 0.3s ease;
        }

        .sidebar-link {
            transition: all 0.2s ease;
            position: relative;
        }

        .sidebar-link:hover {
            background-color: #333333;
            padding-left: 20px;
        }

        .sidebar-link.active {
            color: #ffffff;
            font-weight: 500;
            background-color: #333;
        }

        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background-color: #2b2b2b;
        }

        .submenu.open {
            max-height: 100px;
        }

        .submenu-link {
            transition: all 0.2s ease;
        }

        .submenu-link:hover {
            background-color: #3a3a3a;
            padding-left: 35px;
        }

        .arrow-icon {
            transition: transform 0.3s ease;
        }

        .arrow-icon.rotate {
            transform: rotate(90deg);
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row">
    <!-- 左侧侧边栏：手机端绝对定位，不占位 -->
    <aside class="sidebar w-64 h-screen hidden md:flex flex-col fixed left-0 top-0 z-50 transform -translate-x-full md:translate-x-0">
        <div class="p-6 border-b border-gray-700">
            <h1 class="text-3xl font-bold text-white">
                <span class="text-blue-400">Vicky</span><span class="text-white">Pedia</span>
            </h1>
            <p class="text-gray-400 text-sm mt-1">交易知识 · 策略分享</p>
        </div>

        <nav class="flex-1 py-4">
            <ul class="space-y-1">
                <li>
                    <a onclick="loadPage('home')" class="sidebar-link cursor-pointer block px-6 py-3 text-gray-300 hover:text-white">
                        <i class="fa fa-home mr-3"></i>首页
                    </a>
                </li>

                <li>
                    <button id="strategyBtn" class="sidebar-link w-full text-left px-6 py-3 text-gray-300 hover:text-white flex items-center justify-between">
                        <span><i class="fa fa-line-chart mr-3"></i>策略</span>
                        <i class="fa fa-angle-right arrow-icon text-gray-500"></i>
                    </button>
                    <ul id="strategySubmenu" class="submenu">
                        <li>
                            <a onclick="loadPage('trend')" class="submenu-link cursor-pointer block px-6 py-2.5 text-gray-300 hover:text-white">
                                <i class="fa fa-arrow-up mr-3"></i>趋势交易
                            </a>
                        </li>
                        <li>
                            <a onclick="loadPage('swing')" class="submenu-link cursor-pointer block px-6 py-2.5 text-gray-300 hover:text-white">
                                <i class="fa fa-chart-line mr-3"></i>波段交易
                            </a>
                        </li>
                    </ul>
                </li>

                <li>
                    <a onclick="loadPage('study')" class="sidebar-link cursor-pointer block px-6 py-3 text-gray-300 hover:text-white">
                        <i class="fa fa-book mr-3"></i>学习
                    </a>
                </li>

                <li>
                    <a onclick="loadPage('contact')" class="sidebar-link cursor-pointer block px-6 py-3 text-gray-300 hover:text-white">
                        <i class="fa fa-envelope mr-3"></i>联系
                    </a>
                </li>
            </ul>
        </nav>

        <div class="p-6 border-t border-gray-700">
            <div class="text-gray-400 text-sm space-y-1">
                <p><i class="fa fa-envelope mr-2"></i>contact@vickypedia.com</p>
            </div>
        </div>
    </aside>

    <!-- 右侧内容：手机端全屏，电脑端自动留白 -->
    <main class="flex-1 w-full min-h-screen md:ml-64">
        <!-- 移动端菜单按钮 -->
        <button id="mobileMenuBtn" class="md:hidden fixed top-4 left-4 z-50 bg-gray-800 text-white p-2 rounded-lg shadow-lg">
            <i class="fa fa-bars"></i>
        </button>
        
        <!-- iframe 内容区 -->
        <iframe id="contentFrame" class="w-full h-screen border-none" src="about:blank"></iframe>
    </main>

    <script>
        // 策略二级菜单
        const strategyBtn = document.getElementById('strategyBtn');
        const strategySubmenu = document.getElementById('strategySubmenu');
        const arrowIcon = document.querySelector('.arrow-icon');
        strategyBtn.addEventListener('click', () => {
            strategySubmenu.classList.toggle('open');
            arrowIcon.classList.toggle('rotate');
        });

        // 手机端菜单控制（核心修复）
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.querySelector('.sidebar');
        
        mobileMenuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
        });

        // 点击菜单后自动关闭手机端侧边栏
        document.querySelectorAll('.sidebar-link, .submenu-link').forEach(item => {
            item.addEventListener('click', () => {
                if(window.innerWidth < 768) {
                    sidebar.classList.add('-translate-x-full');
                }
            });
        });

        // 页面切换
        const frame = document.getElementById('contentFrame');
        function loadPage(type) {
            if(type === 'study') {
                frame.src = 'test.html'; // 学习 → 显示 test.html
            } else if(type === 'home') {
                frame.src = 'home.html';
            } else if(type === 'trend') {
                frame.src = 'trend.html';
            } else if(type === 'swing') {
                frame.src = 'swing.html';
            } else if(type === 'contact') {
                frame.src = 'contact.html';
            }
        }

        // 默认加载首页
        window.onload = () => {
            loadPage('home');
            // 初始化显示侧边栏（电脑端）
            sidebar.classList.remove('hidden');
        };
    </script>
</body>
</html>
