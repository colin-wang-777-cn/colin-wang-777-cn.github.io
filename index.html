<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VickyPedia - 交易学习与策略</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            overflow-x: hidden;
        }

        /* 侧边栏核心样式 - 黑金白高级风格 */
        .sidebar {
            background-color: #1a1a1a; /* 深黑主背景 */
            transition: all 0.3s ease;
            box-shadow: 2px 0 15px rgba(0,0,0,0.15);
        }

        .sidebar-link {
            transition: all 0.2s ease;
            position: relative;
            color: #ffffff; /* 文字纯白 */
        }

        .sidebar-link:hover {
            background-color: rgba(255, 215, 0, 0.1); /* hover浅金透黑 */
            padding-left: 20px;
            color: #F7931A; /* hover文字金色 */
        }

        .sidebar-link.active {
            background-color: #F7931A; /* 激活态金色 */
            color: #1a1a1a; /* 激活态文字黑色 */
            font-weight: 600;
        }

        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background-color: #242424; /* 子菜单深灰黑 */
        }

        .submenu.open {
            max-height: 400px;
        }

        .submenu-link {
            transition: all 0.2s ease;
            color: #ffffff;
        }

        .submenu-link:hover {
            background-color: rgba(255, 215, 0, 0.1);
            padding-left: 35px;
            color: #F7931A;
        }

        .arrow-icon {
            transition: transform 0.3s ease;
            color: #F7931A; /* 箭头金色 */
        }

        .arrow-icon.rotate {
            transform: rotate(90deg);
        }

        /* 滚动条美化 - 黑金配色 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f8f8f8;
        }
        ::-webkit-scrollbar-thumb {
            background: #F7931A;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #e6c200;
        }

        /* Logo区域样式 */
        .logo-text {
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .logo-text span:first-child {
            color: #F7931A; /* Logo前缀金色 */
        }
        .logo-desc {
            color: rgba(255,255,255,0.8);
        }

        /* 移动端按钮优化 */
        .mobile-btn {
            background-color: #1a1a1a !important;
            border: 1px solid #F7931A !important;
            outline: none;
        }
        .mobile-btn:hover {
            background-color: #242424 !important;
            color: #F7931A !important;
        }

        /* 边框装饰 - 金色细边框 */
        .gold-border {
            border-color: rgba(255, 215, 0, 0.3) !important;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row">
    <!-- 左侧侧边栏：黑金白高级商务风格 -->
    <aside class="sidebar w-64 h-screen hidden md:flex flex-col fixed left-0 top-0 z-50 transform -translate-x-full md:translate-x-0">
        <!-- Logo区域 -->
        <div class="p-6 border-b gold-border">
            <h1 class="text-3xl font-bold logo-text">
                <span><i class="fa fa-american-sign-language-interpreting mr-5"></i>Vicky</span><span>Pedia</span>

            </h1>
            <p class="logo-desc text-sm mt-1">量化交易 与 知识分享</p>
        </div>

        <!-- 导航菜单 -->
        <nav class="flex-1 py-4">
            <ul class="space-y-1">
                <!-- 首页 -->
                <li>
                    <a onclick="loadPage('home')" class="sidebar-link cursor-pointer block px-6 py-3">
                        <i class="fa fa-home mr-3"></i>首页
                    </a>
                </li>

                <!-- 美股策略（二级菜单） -->
                <li>
                    <button id="strategyBtn" class="sidebar-link w-full text-left px-6 py-3 flex items-center justify-between">
                        <span><i class="fa fa-cogs mr-3"></i>美股策略</span>
                        <i class="fa fa-angle-right arrow-icon"></i>
                    </button>
                    <ul id="strategySubmenu" class="submenu">
                        <li>
                            <a onclick="loadPage('trend')" class="submenu-link cursor-pointer block px-4 py-2.5">
                               &nbsp&nbsp <i class="fa fa-line-chart mr-3"></i>趋势交易
                            </a>
                        </li>
                        <li>
                            <a onclick="loadPage('swing')" class="submenu-link cursor-pointer block px-4 py-2.5">
                                &nbsp&nbsp <i class="fa fa-bar-chart mr-3"></i>波段交易
                            </a>
                        </li>
                    </ul>
                </li>
                <!-- A股策略（二级菜单） -->
                <li>
                    <button id="strategyCNBtn" class="sidebar-link w-full text-left px-6 py-3 flex items-center justify-between">
                        <span><i class="fa fa-cogs mr-3"></i>A股策略</span>
                        <i class="fa fa-angle-right arrow-icon"></i>
                    </button>
                    <ul id="strategyCNSubmenu" class="submenu">
                        <li>
                            <a onclick="loadPage('trend-cn')" class="submenu-link cursor-pointer block px-4 py-2.5">
                               &nbsp&nbsp <i class="fa fa-line-chart mr-3"></i>趋势交易
                            </a>
                        </li>
                        <li>
                            <a onclick="loadPage('swing-cn')" class="submenu-link cursor-pointer block px-4 py-2.5">
                                &nbsp&nbsp <i class="fa fa-bar-chart mr-3"></i>波段交易
                            </a>
                        </li>
                    </ul>
                </li>
                <!-- 学习 -->
                <li>
                    <button id="studyBtn" class="sidebar-link w-full text-left px-6 py-3 flex items-center justify-between">
                        <span><i class="fa fa-book mr-3"></i>金融知识</span>
                        <i class="fa fa-angle-right arrow-icon"></i>
                    </button>
                    <ul id="studySubmenu" class="submenu">
                        <li>
                            <a onclick="loadPage('w1')" class="submenu-link cursor-pointer block px-4 py-2.5">
                               &nbsp&nbsp <i class="fa fa-battery-0 mr-3"></i>第一周
                            </a>
                        </li>
                        <li>
                            <a onclick="loadPage('w2')" class="submenu-link cursor-pointer block px-4 py-2.5">
                                &nbsp&nbsp <i class="fa fa-battery-1 mr-3"></i>第二周
                            </a>
                        </li>
                        <li>
                            <a onclick="loadPage('w3')" class="submenu-link cursor-pointer block px-4 py-2.5">
                                &nbsp&nbsp <i class="fa fa-battery-1 mr-3"></i>第三周
                            </a>
                        </li>
                        <li>
                            <a onclick="loadPage('w4')" class="submenu-link cursor-pointer block px-4 py-2.5">
                                &nbsp&nbsp <i class="fa fa-battery-2 mr-3"></i>第四周
                            </a>
                        </li>           
                        <li>
                            <a onclick="loadPage('w5')" class="submenu-link cursor-pointer block px-4 py-2.5">
                                &nbsp&nbsp <i class="fa fa-battery-2 mr-3"></i>第五周
                            </a>
                        </li>     
                        <li>
                            <a onclick="loadPage('w6')" class="submenu-link cursor-pointer block px-4 py-2.5">
                                &nbsp&nbsp <i class="fa fa-battery-3 mr-3"></i>第六周
                            </a>
                        </li>          
                        <li>
                            <a onclick="loadPage('w7')" class="submenu-link cursor-pointer block px-4 py-2.5">
                                &nbsp&nbsp <i class="fa fa-battery-3 mr-3"></i>第七周
                            </a>
                        </li>     
                        <li>
                            <a onclick="loadPage('w8')" class="submenu-link cursor-pointer block px-4 py-2.5">
                                &nbsp&nbsp <i class="fa fa-battery-4 mr-3"></i>第八周
                            </a>
                        </li>                                                                                                           
                    </ul>
                </li>


                <!-- 联系 -->
                <li>
                    <a onclick="loadPage('contact')" class="sidebar-link cursor-pointer block px-6 py-3">
                        <i class="fa fa-user-circle mr-3"></i>关于我们
                    </a>
                </li>
            </ul>
        </nav>

        <!-- 底部信息 -->
        <div class="p-6 border-t gold-border">
            <div class="text-white/80 text-sm space-y-1">
                <p align="right">@2026 <a href="mailto:vicky.wang100707@gmail.com"><i class="fa fa-envelope mr-1"></i>&nbsp&nbsp&nbsp</a></p>
            </div>
        </div>
    </aside>

    <!-- 右侧内容区 -->
    <main class="flex-1 w-full min-h-screen md:ml-64 bg-white">
        <!-- 移动端菜单按钮 -->
        <button id="mobileMenuBtn" class="mobile-btn md:hidden fixed top-4 left-4 z-50 text-white p-2 rounded-lg shadow-md">
            <i class="fa fa-bars"></i>
        </button>
        
        <!-- 内容嵌入iframe -->
        <iframe id="contentFrame" class="w-full h-screen border-none" src="about:blank"></iframe>
    </main>

    <script>
        // 策略二级菜单展开/收起
        const strategyBtn = document.getElementById('strategyBtn');
        const strategySubmenu = document.getElementById('strategySubmenu');
        const arrowIcon = document.querySelector('.arrow-icon');
        strategyBtn.addEventListener('click', () => {
            strategySubmenu.classList.toggle('open');
            arrowIcon.classList.toggle('rotate');
        });
        // 策略二级菜单展开/收起
        const strategyCNBtn = document.getElementById('strategyCNBtn');
        const strategyCNSubmenu = document.getElementById('strategyCNSubmenu');
        const arrowIconCN = document.querySelector('.arrow-icon');
        strategyCNBtn.addEventListener('click', () => {
            strategyCNSubmenu.classList.toggle('open');
            arrowIconCN.classList.toggle('rotate');
        });        
        // 学习二级菜单展开/收起
        const studyBtn = document.getElementById('studyBtn');
        const studySubmenu = document.getElementById('studySubmenu');
        const arrowIcon2 = document.querySelector('.arrow-icon');
        studyBtn.addEventListener('click', () => {
            studySubmenu.classList.toggle('open');
            arrowIcon2.classList.toggle('rotate');
        });
        // 手机端菜单控制（无占位空白）
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.querySelector('.sidebar');
        
        mobileMenuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
        });

        // 点击菜单后自动关闭手机端侧边栏
        document.querySelectorAll('.sidebar-link, .submenu-link').forEach(item => {
            item.addEventListener('click', () => {
                if(window.innerWidth < 768) {
                    sidebar.classList.add('-translate-x-full');
                }
            });
        });

        // 页面切换核心功能
        const frame = document.getElementById('contentFrame');
        function loadPage(type) {
            // 移除所有active类
            document.querySelectorAll('.sidebar-link, .submenu-link').forEach(link => {
                link.classList.remove('active');
            });
            // 给当前点击的菜单添加active类
            event.target.classList.add('active');
            
            // 加载对应页面
            if(type === 'study') {
                frame.src = 'study.html'; // 学习 → 显示study.html
            } else if(type === 'home') {
                frame.src = 'home.html';
            } else if(type === 'trend') {
                frame.src = 'trend.html';
            } else if(type === 'swing') {
                frame.src = 'swing.html';
            } else if(type === 'contact') {
                frame.src = 'contact.html';
            } else if(type === 'trend-cn') {
                frame.src = 'trend-cn.html';
            } else if(type === 'swing-cn') {
                frame.src = 'swing-cn.html';
            } else if(type === 'contact') {
                frame.src = 'contact.html';                
            } else if(type === 'w1') {
                frame.src = 'w1.html';    
            } else if(type === 'w2') {
                frame.src = 'w2.html';   
            } else if(type === 'w3') {
                frame.src = 'w3.html';   
            } else if(type === 'w4') {
                frame.src = 'w4.html';      
            } else if(type === 'w5') {
                frame.src = 'w5.html';      
            } else if(type === 'w6') {
                frame.src = 'w6.html';          
            } else if(type === 'w7') {
                frame.src = 'w7.html';      
            } else if(type === 'w8') {
                frame.src = 'w8.html';                                                              
            }

        }

        // 默认加载首页
        window.onload = () => {
            loadPage('home');
            sidebar.classList.remove('hidden');
            // 给首页添加默认active
            document.querySelector('.sidebar-link').classList.add('active');
        };
    </script>
</body>
</html>
