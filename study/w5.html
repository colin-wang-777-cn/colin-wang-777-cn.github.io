
        <!DOCTYPE html>
        <html lang="zh-CN">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Week 5</title>
            <style>
                * {
                    margin: 0;
                    padding: 0;
                    box-sizing: border-box;
                    font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
                }
                body {
                    background-color: #1a1a1a;
                    padding: 30px 20px;
                    max-width: 1000px;
                    margin: 0 auto;
                    color: #2D3748;
                    line-height: 1.8;
                }

                /* === 顶部主标题：美股弹性股票推荐 === */
                .main-title {
                    text-align: center;
                    font-size: 28px;
                    font-weight: 700;
                    color: #FFFFFF;
                    background-color: #F7931A;
                    padding: 16px 20px;
                    border-radius: 14px;
                    margin-bottom: 30px;
                    box-shadow: 0 2px 8px rgba(78, 205, 196, 0.15);
                }

                /* 内容卡片 */
                .card {
                    background: #FFFFFF;
                    padding: 28px;
                    border-radius: 16px;
                    box-shadow: 0 3px 12px rgba(0, 0, 0, 0.04);
                    margin-bottom: 25px;
                }

                /* 标题 */
                h1, h2, h3 {
                    color: #2D3748;
                    margin: 18px 0 10px 0;
                }
                h2 {
                    color: #F7931A;
                    font-size: 22px;
                }
                p {
                    font-size: 15px;
                    color: #444;
                    margin: 10px 0;
                }

                /* 粗体自动变色（核心） */
                strong {
                    color: #F7931A;
                    font-weight: 600;
                }

                /* 表格样式（纯色） */
                table {
                    border-collapse: collapse;
                    width: 100%;
                    background: #fff;
                    margin: 16px 0;
                    border-radius: 10px;
                    overflow: hidden;
                }
                th {
                    background-color: #F7931A;
                    color: #fff;
                    padding: 12px 14px;
                    font-size: 14px;
                    font-weight: 600;
                    text-align: left;
                }
                td {
                    padding: 11px 14px;
                    border-bottom: 1px solid #E8F8F7;
                    font-size: 14px;
                    color: #2D3748;
                }
                tr:hover {
                    background-color: #F9FFFE;
                }
            </style>
        </head>
        <body>
            <!-- 顶部主标题 -->
            <div class="main-title">Week 5</div>

            <!-- 内容区域 -->
            <div class="card">
                <h3>第 5 周：财报极简阅读（不用会计基础）</h3>
<p><strong>目标：3 分钟看懂一份财报</strong></p>
<ul>
<li>周一：财报三表是什么（简化版）</li>
<li>周二：看营收增长</li>
<li>周三：看净利润</li>
<li>周四：看毛利率判断竞争力</li>
<li>周五：避雷：亏损、高负债</li>
<li>周末：读一份真实财报练习</li>
</ul>
            </div>
        </body>
        </html>
