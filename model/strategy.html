
        <!DOCTYPE html>
        <html lang="zh-CN">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>数据获取</title>
            <style>
                * {
                    margin: 0;
                    padding: 0;
                    box-sizing: border-box;
                    font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
                }
                body {
                    background-color: #1a1a1a;
                    padding: 30px 20px;
                    max-width: 1000px;
                    margin: 0 auto;
                    color: #2D3748;
                    line-height: 1.8;
                }

                /* === 顶部主标题：美股弹性股票推荐 === */
                .main-title {
                    text-align: center;
                    font-size: 28px;
                    font-weight: 700;
                    color: #FFFFFF;
                    background-color: #F7931A;
                    padding: 16px 20px;
                    border-radius: 14px;
                    margin-bottom: 30px;
                    box-shadow: 0 2px 8px rgba(78, 205, 196, 0.15);
                }

                /* 内容卡片 */
                .card {
                    background: #FFFFFF;
                    padding: 28px;
                    border-radius: 16px;
                    box-shadow: 0 3px 12px rgba(0, 0, 0, 0.04);
                    margin-bottom: 25px;
                }

                /* 标题 */
                h1, h2, h3 {
                    color: #2D3748;
                    margin: 18px 0 10px 0;
                }
                h2 {
                    color: #F7931A;
                    font-size: 22px;
                }
                p {
                    font-size: 15px;
                    color: #444;
                    margin: 10px 0;
                }

                /* 粗体自动变色（核心） */
                strong {
                    color: #F7931A;
                    font-weight: 600;
                }

                /* 表格样式（纯色） */
                table {
                    border-collapse: collapse;
                    width: 100%;
                    background: #fff;
                    margin: 16px 0;
                    border-radius: 10px;
                    overflow: hidden;
                }
                th {
                    background-color: #F7931A;
                    color: #fff;
                    padding: 12px 14px;
                    font-size: 14px;
                    font-weight: 600;
                    text-align: left;
                }
                td {
                    padding: 11px 14px;
                    border-bottom: 1px solid #E8F8F7;
                    font-size: 14px;
                    color: #2D3748;
                }
                tr:hover {
                    background-color: #F9FFFE;
                }
            </style>
        </head>
        <body>
            <!-- 顶部主标题 -->
            <div class="main-title">交易规则</div>

            <!-- 内容区域 -->
            <div class="card">
                <h4>优化过程</h4>
<p>因为大预言模型（LLM）是实时的，我们采取一种 evolving 策略优化过程。即从一个简单的交易规则开始，然后根据对于模型结果的跟踪评估，不断地优化买卖交易规则。</p>
<p><img alt="指标" src="asset/trade.jpeg"  style="width: 100%; height: 100%; object-fit: cover;"/></p>
     <h5>初始交易条件：</h5>
<ul>
<li>买入：每天策略推荐排序前五支股票，仓位各占20%</li>
<li>卖出：卖出当前持仓的股票</li>
</ul>
<p>制定指标集合，用于策略评估和优化，并不断优化交易规则。</p>



            </div>
        </body>
        </html>
